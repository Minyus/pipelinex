name: optional-dependency-matrix

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  tox-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            toxenv: py310-latest
          - python-version: "3.11"
            toxenv: py311-latest
          - python-version: "3.12"
            toxenv: py312-latest
          - python-version: "3.13"
            toxenv: py313-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: python -m pip install --upgrade pip "tox==4.26.0"

      - name: Run tox environment
        run: python -m tox -e ${{ matrix.toxenv }}
